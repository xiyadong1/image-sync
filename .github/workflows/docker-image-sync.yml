name: Docker Image Sync to Tencent Coding and CCR

on:
  push:
    paths:
      - 'images.txt'

env:
  CODING_REGISTRY: ${{ secrets.CODING_REGISTRY }}
  CODING_NAMESPACE: ${{ secrets.CODING_NAMESPACE }}
  CCR_REGISTRY: ${{ secrets.CCR_REGISTRY }}
  CCR_NAMESPACE: ${{ secrets.CCR_NAMESPACE }}

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v2

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 登录到腾讯云 Coding 镜像仓库
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.CODING_REGISTRY }}
          username: ${{ secrets.CODING_USERNAME }}
          password: ${{ secrets.CODING_PASSWORD }}
      
      - name: 登录到腾讯云 CCR 镜像仓库
        run: |
          echo "登录到 CCR: ${{ secrets.CCR_REGISTRY }}"
          echo "${{ secrets.TENCENT_CLOUD_SECRET_KEY }}" | docker login ${{ secrets.CCR_REGISTRY }} \
            --username ${{ secrets.TENCENT_CLOUD_SECRET_ID }} \
            --password-stdin
          echo "CCR 登录成功"

      - name: 读取镜像列表并同步到两个仓库
        run: |
          while IFS= read -r image || [[ -n "$image" ]]; do
            # 跳过空行和注释行
            [[ -z "$image" || "$image" =~ ^#.*$ ]] && continue
            
            echo "=========================================="
            echo "处理镜像: $image"
            echo "=========================================="
            
            # 拉取镜像
            docker pull $image || exit 1
            
            # 解析镜像名称和标签
            IFS=':' read -r name tag <<< "$image"
            
            # 处理可能包含额外层级的镜像名称
            IFS='/' read -r org repo <<< "$name"
            if [ -z "$repo" ]; then
              repo=$org
              org=""
            fi
            
            # 构建 Coding 目标镜像名称
            if [ -z "$org" ]; then
              coding_target="${CODING_REGISTRY}/${CODING_NAMESPACE}/${repo}:${tag}"
            else
              coding_target="${CODING_REGISTRY}/${CODING_NAMESPACE}/${org}-${repo}:${tag}"
            fi
            
            # 构建 CCR 目标镜像名称
            if [ -z "$org" ]; then
              ccr_target="${CCR_REGISTRY}/${CCR_NAMESPACE}/${repo}:${tag}"
            else
              ccr_target="${CCR_REGISTRY}/${CCR_NAMESPACE}/${org}-${repo}:${tag}"
            fi
            
            echo "Coding 目标: $coding_target"
            echo "CCR 目标: $ccr_target"
            
            # 标记并推送到 Coding
            docker tag $image $coding_target
            docker push $coding_target
            if [ $? -eq 0 ]; then
              echo "✓ 镜像已成功推送到 Coding: $coding_target"
            else
              echo "✗ 推送到 Coding 失败"
              exit 1
            fi
            
            # 标记并推送到 CCR
            docker tag $image $ccr_target
            docker push $ccr_target
            if [ $? -eq 0 ]; then
              echo "✓ 镜像已成功推送到 CCR: $ccr_target"
            else
              echo "✗ 推送到 CCR 失败"
              exit 1
            fi
            
            # 清理本地镜像
            docker rmi $coding_target $ccr_target $image || true
            
            echo "✓ 镜像 $image 同步完成"
            echo ""
            
          done < images.txt
          
          echo "=========================================="
          echo "所有镜像同步完成！"
          echo "=========================================="
