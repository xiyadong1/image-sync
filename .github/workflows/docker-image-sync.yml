name: Docker Image Sync to Tencent Coding & Tencent CCR

on:
  push:
    paths:
      - 'images.txt'

env:
  # Coding 仓库环境变量
  CODING_REGISTRY: ${{ secrets.CODING_REGISTRY }}
  CODING_NAMESPACE: ${{ secrets.CODING_NAMESPACE }}
  # 腾讯云容器镜像服务 CCR 环境变量
  CCR_REGISTRY: ${{ secrets.CCR_REGISTRY }}
  CCR_NAMESPACE: ${{ secrets.CCR_NAMESPACE }}
  # ===== [新增] 全局默认拉取平台架构 =====
  # 可选值: linux/amd64, linux/arm64, linux/arm/v7 等
  # 可在此处修改，也可在 GitHub > Settings > Secrets and variables > Actions > Variables 中设置
  PLATFORM: linux/amd64

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v2

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 登录到腾讯云 Coding 镜像仓库
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.CODING_REGISTRY }}
          username: ${{ secrets.CODING_USERNAME }}
          password: ${{ secrets.CODING_PASSWORD }}

      - name: 登录腾讯云CCR容器镜像仓库
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.CCR_REGISTRY }}
          username: ${{ secrets.CCR_USERNAME }}
          password: ${{ secrets.CCR_PASSWORD }}
          ecr: false

      - name: 读取镜像列表并同步到 Coding + CCR
        run: |
          # 读取 images.txt 文件中的镜像列表
          while IFS= read -r line || [[ -n "$line" ]]; do
            # 跳过空行和注释行
            [[ -z "$line" || "$line" =~ ^#.*$ ]] && continue
            
            # ===== [修改] 解析平台和镜像 =====
            # 支持两种格式：
            #   image:tag              -> 使用 $PLATFORM 默认平台
            #   image:tag|linux/arm64  -> 使用指定的平台（按行覆盖）
            if [[ "$line" == *"|"* ]]; then
              image="${line%%|*}"
              platform="${line##*|}"
            else
              image="$line"
              platform="${PLATFORM}"
            fi
            
            echo "===== 开始处理源镜像: $image (平台: $platform) ====="
            
            # ===== [修改] 拉取镜像时指定平台架构 =====
            docker pull --platform "$platform" "$image" || exit 1
            
            # 解析镜像名称和标签
            IFS=':' read -r name tag <<< "$image"
            
            # 处理可能包含额外层级的镜像名称
            IFS='/' read -r org repo <<< "$name"
            if [ -z "$repo" ]; then
              repo=$org
              org=""
            fi

            ##############################
            # 1. 生成 Coding 目标镜像名称
            ##############################
            if [ -z "$org" ]; then
              coding_target="${CODING_REGISTRY}/${CODING_NAMESPACE}/${repo}:${tag}"
            else
              coding_target="${CODING_REGISTRY}/${CODING_NAMESPACE}/${org}-${repo}:${tag}"
            fi
            # 打标签并推送到 Coding
            docker tag "$image" "$coding_target"
            docker push "$coding_target"
            echo "✅ 已同步至 Coding: $coding_target"

            ##############################
            # 2. 生成 CCR 容器镜像服务目标镜像名称
            ##############################
            if [ -z "$org" ]; then
              ccr_target="${CCR_REGISTRY}/${CCR_NAMESPACE}/${repo}:${tag}"
            else
              ccr_target="${CCR_REGISTRY}/${CCR_NAMESPACE}/${org}-${repo}:${tag}"
            fi
            # 打标签并推送到腾讯云CCR
            docker tag "$image" "$ccr_target"
            docker push "$ccr_target"
            echo "✅ 已同步至腾讯云CCR: $ccr_target"

            echo "===== 镜像 $image 全部同步完成 ====="
            echo ""
          done < images.txt
