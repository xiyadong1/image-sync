name: Docker Image Sync to Tencent Coding & Tencent CCR

on:
  push:
    paths:
      - 'images.txt'

env:
  # Coding 仓库环境变量
  CODING_REGISTRY: ${{ secrets.CODING_REGISTRY }}
  CODING_NAMESPACE: ${{ secrets.CODING_NAMESPACE }}
  # 腾讯云CCR环境变量
  CCR_REGISTRY: ${{ secrets.CCR_REGISTRY }}
  CCR_NAMESPACE: ${{ secrets.CCR_NAMESPACE }}
  # crane 超时配置
  CRANE_TIMEOUT: "300s"

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 1. 安装 crane 容器工具（核心优化）
      - name: Install crane
        run: |
          curl -fsSL https://github.com/google/go-containerregistry/releases/latest/download/crane_Linux_x86_64.tar.gz | tar xz
          sudo mv crane /usr/local/bin/
          crane version

      # 2. 登录两个镜像仓库（crane复用docker登录凭证）
      - name: 登录到腾讯云 Coding 镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CODING_REGISTRY }}
          username: ${{ secrets.CODING_USERNAME }}
          password: ${{ secrets.CODING_PASSWORD }}

      - name: 登录腾讯云CCR容器镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CCR_REGISTRY }}
          username: ${{ secrets.CCR_USERNAME }}
          password: ${{ secrets.CCR_PASSWORD }}

      # 3. 读取镜像列表，使用crane跨仓库复制，跳过已存在镜像
      - name: 高性能同步镜像（crane）
        run: |
          # 读取镜像列表
          while IFS= read -r image || [[ -n "$image" ]]; do
            # 跳过空行、注释
            [[ -z "$image" || "$image" =~ ^#.*$ ]] && continue
            echo "===== 处理源镜像: $image ====="

            # 解析镜像名与tag
            IFS=':' read -r name tag <<< "$image"
            IFS='/' read -r org repo <<< "$name"
            if [ -z "$repo" ]; then
              repo=$org
              org=""
            fi

            # 构造 Coding 目标地址
            if [ -z "$org" ]; then
              coding_target="${CODING_REGISTRY}/${CODING_NAMESPACE}/${repo}:${tag}"
            else
              coding_target="${CODING_REGISTRY}/${CODING_NAMESPACE}/${org}-${repo}:${tag}"
            fi

            # 构造 CCR 目标地址
            if [ -z "$org" ]; then
              ccr_target="${CCR_REGISTRY}/${CCR_NAMESPACE}/${repo}:${tag}"
            else
              ccr_target="${CCR_REGISTRY}/${CCR_NAMESPACE}/${org}-${repo}:${tag}"
            fi

            # ========== 同步到 Coding ==========
            echo "同步至 Coding: $coding_target"
            # crane copy：--skip-existing 自动跳过仓库已存在镜像，超时5分钟
            crane copy \
              --skip-existing \
              --timeout $CRANE_TIMEOUT \
              "$image" "$coding_target"
            echo "✅ Coding 同步完成"

            # ========== 同步到 CCR ==========
            echo "同步至 CCR: $ccr_target"
            crane copy \
              --skip-existing \
              --timeout $CRANE_TIMEOUT \
              "$image" "$ccr_target"
            echo "✅ CCR 同步完成"

            echo "===== $image 全部同步完毕 ====="
            echo ""
          done < images.txt
